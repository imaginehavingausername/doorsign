<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Sign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Switched to Inter (Not rounded) and added Bungee for countdown -->
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif; /* Updated Font */
            overflow: hidden;
            margin: 0;
            background-color: #81C784; /* More green fallback */
        }

        .font-bungee {
            font-family: 'Bungee', sans-serif;
        }

        /* --- Dedicated Background Layer (Spring Theme) --- */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Sunny spring sky blending into vibrant green grass */
            background: radial-gradient(circle at center, #E8F5E9 0%, #A5D6A7 50%, #66BB6A 100%);
            background-size: 300% 300%;
            animation: radialShift 20s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes radialShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 70%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Warm Sunbeams Effect (Replaced Aurora) --- */
        .sunbeam-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh; 
            overflow: hidden;
            z-index: 2;
            pointer-events: none;
            opacity: 0.6;
            mix-blend-mode: overlay;
        }

        .sunbeam {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.4) 15%,
                rgba(255, 250, 205, 0.2) 30%,
                rgba(255, 255, 255, 0) 45%
            );
            background-size: 200% 200%;
            filter: blur(20px);
            animation: beamMove 18s linear infinite alternate;
        }

        .sunbeam:nth-child(2) {
            top: -40%;
            animation-duration: 25s;
            animation-direction: alternate-reverse;
            background: repeating-linear-gradient(
                -45deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 235, 150, 0.3) 20%,
                rgba(255, 255, 255, 0.1) 40%,
                rgba(255, 255, 255, 0) 60%
            );
            filter: blur(30px);
        }

        @keyframes beamMove {
            0% { transform: translateX(-5%) translateY(-5%) rotate(0deg); }
            100% { transform: translateX(5%) translateY(5%) rotate(3deg); }
        }

        /* --- Main Screen Container --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffffff;
            /* Slightly darkened text shadow for better contrast against lighter spring background */
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.35); 
            z-index: 20; /* Text on top */
            pointer-events: none;
            transition: opacity 1s ease-in-out;
        }

        /* --- Effects Styling (Cherry Blossom Petals) --- */
        .effect-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 5; /* Between BG and Text */
            pointer-events: none;
        }

        .petal {
            position: absolute;
            top: -20px;
            /* Petal shape via border-radius */
            border-radius: 15px 0px 15px 0px; 
            opacity: 0.8;
            animation: flutter linear infinite;
            box-shadow: 0 0 5px rgba(255, 192, 203, 0.4);
        }

        @keyframes flutter {
            0% { 
                transform: translateY(-10vh) translateX(0px) rotate(0deg); 
            }
            50% {
                transform: translateY(50vh) translateX(30px) rotate(180deg);
            }
            100% { 
                transform: translateY(110vh) translateX(-20px) rotate(360deg); 
            }
        }

        #message-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Sleep Mode / Blackout --- */
        #blackout-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999; /* On top of absolutely everything */
            display: none; /* Hidden by default */
            cursor: none;
        }
    </style>
</head>
<body>

    <!-- Blackout Layer for Night Mode -->
    <div id="blackout-layer"></div>

    <!-- Background Layer -->
    <div id="bg-layer"></div>

    <!-- Sunbeams Layer (Replaced Aurora) -->
    <div class="sunbeam-container">
        <div class="sunbeam"></div>
        <div class="sunbeam"></div>
    </div>

    <!-- Container for visual effects (Petals) -->
    <div id="effects-container" class="effect-container"></div>

    <!-- Screen 1: Main message -->
    <div id="message-screen" class="screen" style="opacity: 1;">
        <div id="message-content">
            <!-- Loading message content... -->
        </div>
    </div>

    <!-- Screen 2: Countdown Screen -->
    <div id="countdown-screen" class="screen" style="opacity: 0; pointer-events: none;">
        <div class="rounded-[2rem] shadow-2xl flex flex-col items-center justify-center py-8 px-4 w-full max-w-[350px] border-4 border-white/20" style="background-color: #3b82f6;">
            <h2 class="text-2xl text-white font-black mb-6 text-center drop-shadow-md uppercase tracking-wide">Jacob's Birthday</h2>
            <div class="flex gap-2 justify-center w-full">
                <!-- WEEKS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-weeks">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">WEEKS</span>
                </div>
                <!-- DAYS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-days">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">DAYS</span>
                </div>
                <!-- HOURS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-hours">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">HOURS</span>
                </div>
                <!-- SECONDS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-seconds">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">SECS</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messageContent = document.getElementById('message-content');
        const effectsContainer = document.getElementById('effects-container');
        const blackoutLayer = document.getElementById('blackout-layer');
        
        async function loadMessage() {
            try {
                // Cache busting to ensure we get new messages immediately
                const response = await fetch('message.html?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();
                if (messageContent.innerHTML !== html) {
                    messageContent.innerHTML = html;
                }
            } catch (error) {
                console.error('Failed to fetch message:', error);
            }
        }

        // --- Screen Switching Logic ---
        const messageScreen = document.getElementById('message-screen');
        const countdownScreen = document.getElementById('countdown-screen');
        let isShowingMessage = true;

        setInterval(() => {
            isShowingMessage = !isShowingMessage;
            if (isShowingMessage) {
                messageScreen.style.opacity = '1';
                countdownScreen.style.opacity = '0';
            } else {
                messageScreen.style.opacity = '0';
                countdownScreen.style.opacity = '1';
            }
        }, 5000);

        // --- Countdown Logic ---
        function getNextMarch26() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 2, 26, 0, 0, 0);
            if (target < now) {
                target = new Date(now.getFullYear() + 1, 2, 26, 0, 0, 0);
            }
            return target;
        }

        let countdownTargetDate = getNextMarch26();

        function updateCountdown() {
            const now = new Date();
            let diff = countdownTargetDate - now;

            if (diff <= 0) {
                diff = 0;
                countdownTargetDate = getNextMarch26();
            }

            const totalSeconds = Math.floor(diff / 1000);
            const secondsInDay = 24 * 60 * 60;
            const secondsInWeek = 7 * secondsInDay;

            const weeks = Math.floor(totalSeconds / secondsInWeek);
            let remainder = totalSeconds % secondsInWeek;

            const days = Math.floor(remainder / secondsInDay);
            remainder %= secondsInDay;

            const hours = Math.floor(remainder / 3600);
            remainder %= 3600;

            const seconds = remainder % 60;

            const formatValue = (value, pad = 2) => value.toString().padStart(pad, '0');

            document.getElementById('cd-weeks').textContent = formatValue(weeks);
            document.getElementById('cd-days').textContent = formatValue(days);
            document.getElementById('cd-hours').textContent = formatValue(hours);
            document.getElementById('cd-seconds').textContent = formatValue(seconds);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // --- Spring Blossom Logic ---

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            const size = Math.random() * 8 + 6; // Size between 6px and 14px
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.opacity = Math.random() * 0.6 + 0.4;
            
            // Randomize spring petal colors
            const colors = ['#FFB7B2', '#FF9AA2', '#FFDAC1', '#FFFFFF'];
            petal.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            const duration = Math.random() * 4 + 4; // 4 to 8 seconds fall time
            petal.style.animationDuration = duration + 's';

            effectsContainer.appendChild(petal);
            setTimeout(() => { petal.remove(); }, duration * 1000);
        }

        // --- Night Mode / Timer Logic ---
        function checkTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            // 10:45 PM is 22:45
            // 6:00 AM is 6:00
            
            const currentTotalMinutes = hours * 60 + minutes;
            const startBlackoutMinutes = 22 * 60 + 45; // 1365
            const endBlackoutMinutes = 6 * 60;         // 360

            // Logic: Blackout if Current time is GREATER than Start OR LESS than End
            if (currentTotalMinutes >= startBlackoutMinutes || currentTotalMinutes < endBlackoutMinutes) {
                if (blackoutLayer.style.display !== 'block') {
                    blackoutLayer.style.display = 'block';
                }
            } else {
                if (blackoutLayer.style.display !== 'none') {
                    blackoutLayer.style.display = 'none';
                }
            }
        }

        // Initial Calls
        loadMessage();
        checkTime();

        // Intervals
        setInterval(loadMessage, 5000); 
        setInterval(createPetal, 200); // Changed from snowflakes to petals
        setInterval(checkTime, 60000); // Check time every minute

    </script>
</body>
</html>
