<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Looping Background Video</title>
    <style>
        /* Reset margins and padding to prevent scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; /* Fallback color while video loads */
        }

        /* Style the video to fill the screen perfectly */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Ensures the video covers the entire viewport without distortion */
            z-index: -1; /* Puts the video behind all other content on the page */
        }

        /* Example styling for content layered on top of the video */
        .content {
            position: relative;
            z-index: 1;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            /* Optional: Add a dark overlay so text is easier to read against bright videos */
            background-color: rgba(0, 0, 0, 0.3); 
        }
    </style>
</head>
<body>

    <!-- 
      Video Element
      autoplay: Starts playing automatically
      loop: Repeats the video indefinitely
      muted: Required by browsers to allow autoplay
      playsinline: Prevents the video from automatically going full-screen on mobile
    -->
    <video class="background-video" autoplay loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>
</html>
