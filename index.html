<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Sign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Combined Nunito for the main text/labels and Bungee for the countdown numbers -->
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            margin: 0;
            background-color: #74b9ff;
        }

        .font-bungee {
            font-family: 'Bungee', sans-serif;
        }

        /* --- Dedicated Background Layer --- */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #89C4F4 0%, #B0E0E6 50%, #5D9CEC 100%);
            background-size: 300% 300%;
            animation: radialShift 20s ease-in-out infinite;
            z-index: -2;
        }

        @keyframes radialShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Aurora Effect --- */
        #aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, rgba(46, 204, 113, 0.2), rgba(52, 152, 219, 0.2), rgba(155, 89, 182, 0.2));
            filter: blur(40px);
            opacity: 0.6;
            animation: auroraWaver 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes auroraWaver {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(-20px, 20px); }
        }

        /* --- Snowflake Styles --- */
        .snowflake {
            position: fixed;
            top: -10vh;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 20;
            box-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }

        /* --- Blackout Layer --- */
        #blackout {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Background Animations -->
    <div id="bg-layer"></div>
    <div id="aurora"></div>

    <!-- Screen 1: Message Screen -->
    <div id="message-container" class="absolute inset-0 flex items-center justify-center p-6 z-10 transition-opacity duration-1000" style="opacity: 1;">
        <h1 id="message" class="text-5xl md:text-7xl text-white font-black text-center drop-shadow-[0_4px_4px_rgba(0,0,0,0.3)] w-full break-words">Loading...</h1>
    </div>

    <!-- Screen 2: Countdown Screen -->
    <div id="countdown-screen" class="absolute inset-0 flex items-center justify-center p-4 z-10 transition-opacity duration-1000" style="opacity: 0; pointer-events: none;">
        <!-- Container matching birthday.html styles but with #3b82f6 background instead of white -->
        <div class="rounded-[2rem] shadow-2xl flex flex-col items-center justify-center py-8 px-4 w-full max-w-[350px] border-4 border-white/20" style="background-color: #3b82f6;">
            <h2 class="text-2xl text-white font-black mb-6 text-center drop-shadow-md uppercase tracking-wide">Jacob's Birthday</h2>
            <div class="flex gap-2 justify-center w-full">
                <!-- WEEKS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-weeks">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">WEEKS</span>
                </div>
                <!-- DAYS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-days">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">DAYS</span>
                </div>
                <!-- HOURS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-hours">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">HOURS</span>
                </div>
                <!-- SECONDS -->
                <div class="flex flex-col items-center bg-white rounded-xl py-2 w-[4.5rem] shadow-inner">
                    <span class="text-3xl font-bungee text-[#3b82f6]" id="cd-seconds">00</span>
                    <span class="text-[10px] font-bold text-gray-500 mt-1">SECS</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Night Mode Overlay -->
    <div id="blackout"></div>

    <script>
        // --- Message Loading Logic ---
        async function loadMessage() {
            try {
                // Fetch with cache buster
                const response = await fetch(`message.txt?t=${new Date().getTime()}`);
                if (response.ok) {
                    const text = await response.text();
                    document.getElementById('message').innerText = text;
                }
            } catch (error) {
                console.error('Error fetching message:', error);
            }
        }
        setInterval(loadMessage, 30000); // Check for updates every 30s

        // --- Screen Switching Logic ---
        const messageScreen = document.getElementById('message-container');
        const countdownScreen = document.getElementById('countdown-screen');
        let isShowingMessage = true;

        setInterval(() => {
            isShowingMessage = !isShowingMessage;
            if (isShowingMessage) {
                messageScreen.style.opacity = '1';
                countdownScreen.style.opacity = '0';
            } else {
                messageScreen.style.opacity = '0';
                countdownScreen.style.opacity = '1';
            }
        }, 5000);

        // --- Countdown Logic ---
        function getNextMarch26() {
            const now = new Date();
            // Month is 0-indexed, so 2 is March
            let target = new Date(now.getFullYear(), 2, 26, 0, 0, 0);
            if (target < now) {
                target = new Date(now.getFullYear() + 1, 2, 26, 0, 0, 0);
            }
            return target;
        }

        let countdownTargetDate = getNextMarch26();

        function updateCountdown() {
            const now = new Date();
            let diff = countdownTargetDate - now;

            if (diff <= 0) {
                diff = 0;
                countdownTargetDate = getNextMarch26();
            }

            const totalSeconds = Math.floor(diff / 1000);
            const secondsInDay = 24 * 60 * 60;
            const secondsInWeek = 7 * secondsInDay;

            const weeks = Math.floor(totalSeconds / secondsInWeek);
            let remainder = totalSeconds % secondsInWeek;

            const days = Math.floor(remainder / secondsInDay);
            remainder %= secondsInDay;

            const hours = Math.floor(remainder / 3600);
            remainder %= 3600;

            const seconds = remainder % 60;

            const formatValue = (value, pad = 2) => value.toString().padStart(pad, '0');

            document.getElementById('cd-weeks').textContent = formatValue(weeks);
            document.getElementById('cd-days').textContent = formatValue(days);
            document.getElementById('cd-hours').textContent = formatValue(hours);
            document.getElementById('cd-seconds').textContent = formatValue(seconds);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // --- Snow Falling Logic ---
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            // Random horizontal position
            snowflake.style.left = Math.random() * 100 + 'vw';
            
            // Random opacity for depth
            snowflake.style.opacity = Math.random();
            
            // Random size between 5px and 15px
            const size = Math.random() * 10 + 5;
            snowflake.style.width = size + 'px';
            snowflake.style.height = size + 'px';
            
            // Random fall duration between 5s and 10s
            const duration = Math.random() * 5 + 5;
            snowflake.style.animationDuration = duration + 's';
            
            document.body.appendChild(snowflake);
            
            // Cleanup
            setTimeout(() => { snowflake.remove(); }, duration * 1000);
        }
        setInterval(createSnowflake, 300);

        // --- Night Mode / Timer Logic ---
        const blackoutLayer = document.getElementById('blackout');
        function checkTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            // 10:45 PM is 22:45
            // 6:00 AM is 6:00
            
            const currentTotalMinutes = hours * 60 + minutes;
            const startBlackoutMinutes = 22 * 60 + 45; // 1365
            const endBlackoutMinutes = 6 * 60;         // 360

            // Logic: Blackout if Current time is GREATER than Start OR LESS than End
            if (currentTotalMinutes >= startBlackoutMinutes || currentTotalMinutes < endBlackoutMinutes) {
                if (blackoutLayer.style.display !== 'block') {
                    blackoutLayer.style.display = 'block';
                }
            } else {
                if (blackoutLayer.style.display !== 'none') {
                    blackoutLayer.style.display = 'none';
                }
            }
        }

        // --- Initial Calls ---
        loadMessage();
        checkTime();
        setInterval(checkTime, 60000); // Check night mode every minute
    </script>
</body>
</html>
